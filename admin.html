<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - IHSAN UL HAQ & SONS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/products.js"></script>
  <style>
    .modal-body { max-height: 65vh; overflow-y: auto; }
  </style>
</head>
<body class="bg-[#f1f5f1]">
  <nav class="bg-[#166534] text-white p-4 shadow-md">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-3xl font-bold">👷 Admin Portal</h1>
      <a href="index.html" class="text-white hover:underline text-lg">← Back to Website</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex border-b mb-8 overflow-x-auto">
      <button onclick="showTab(0)" class="tab-button px-8 py-4 font-bold border-b-4 border-[#166534] text-[#166534]">Products</button>
      <button onclick="showTab(1)" class="tab-button px-8 py-4 font-bold text-gray-600">Orders</button>
      <button onclick="showTab(2)" class="tab-button px-8 py-4 font-bold text-gray-600">Create Banner</button>
      <button onclick="showTab(3)" class="tab-button px-8 py-4 font-bold text-gray-600">Active Banners</button>
    </div>

    <!-- PRODUCTS SECTION -->
    <div id="section-0">
      <h2 class="text-3xl font-bold text-[#166534] mb-6">Products Management</h2>
      <div id="stock-alerts" class="bg-yellow-100 border border-yellow-400 p-4 rounded-3xl mb-8 text-sm"></div>

      <!-- Bulk Upload -->
      <div class="bg-white p-6 rounded-3xl shadow mb-10">
        <h3 class="font-bold mb-4 text-xl">Bulk Products Upload</h3>
        <div class="flex gap-4">
          <button onclick="downloadSampleCSV()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-medium">📥 Download Sample CSV</button>
          <label class="bg-green-600 text-white px-6 py-3 rounded-2xl font-medium cursor-pointer">
            📤 Upload CSV
            <input type="file" id="csv-upload" accept=".csv" class="hidden" onchange="handleCSVUpload(event)">
          </label>
        </div>
      </div>

      <!-- Add Single Product -->
      <div class="bg-white p-6 rounded-3xl shadow mb-10">
        <h3 class="font-bold mb-4 text-xl">Add Single Product</h3>
        <div class="grid md:grid-cols-2 gap-4">
          <input id="add-name" placeholder="Product Name" class="border p-4 rounded-2xl">
          <select id="add-category" class="border p-4 rounded-2xl"></select>
          <input id="add-price" type="number" placeholder="Price (Rs.)" class="border p-4 rounded-2xl">
          <input id="add-stock" type="number" placeholder="Stock Quantity" class="border p-4 rounded-2xl">
          <input id="add-discount" type="number" placeholder="Discount %" value="0" class="border p-4 rounded-2xl">
          <input id="add-image-url" placeholder="Image URL (optional)" class="border p-4 rounded-2xl md:col-span-2">
          <input id="add-image-file" type="file" accept="image/*" class="border p-4 rounded-2xl md:col-span-2">
          <button onclick="addNewProduct()" class="bg-[#166534] text-white py-4 rounded-2xl md:col-span-2 font-bold">Add Product</button>
        </div>
      </div>

      <table class="w-full bg-white rounded-3xl shadow overflow-hidden" id="product-table"></table>
    </div>

    <!-- ORDERS SECTION -->
    <div id="section-1" class="hidden">
      <h2 class="text-3xl font-bold text-[#166534] mb-6">All Orders</h2>
      <div id="orders-list" class="space-y-6"></div>
    </div>

    <!-- CREATE BANNER SECTION -->
    <div id="section-2" class="hidden">
      <h2 class="text-3xl font-bold text-[#166534] mb-6">Create New Banner / Offer</h2>
      <div class="bg-white p-8 rounded-3xl shadow">
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="block font-medium mb-2">Banner Title</label>
            <input id="banner-title" class="w-full border p-4 rounded-2xl" placeholder="e.g. Ramadan Special Package">
          </div>
          <div>
            <label class="block font-medium mb-2">Discount (%)</label>
            <input id="banner-discount" type="number" class="w-full border p-4 rounded-2xl" placeholder="20">
          </div>
          <div class="md:col-span-2">
            <label class="block font-medium mb-2">Description</label>
            <textarea id="banner-desc" rows="3" class="w-full border p-4 rounded-2xl" placeholder="Special discount on all grocery items..."></textarea>
          </div>
          <div class="md:col-span-2">
            <label class="block font-medium mb-2">Banner Image</label>
            <input id="banner-image-url" class="w-full border p-4 rounded-2xl mb-3" placeholder="Image URL">
            <input id="banner-image-file" type="file" accept="image/*" class="w-full border p-4 rounded-2xl">
          </div>
        </div>

        <div class="mt-10">
          <label class="block font-medium mb-4">Select Products for this Banner</label>
          <div id="product-checkbox-list" class="max-h-96 overflow-y-auto border rounded-3xl p-6 grid grid-cols-2 gap-4"></div>
        </div>

        <button onclick="createBanner()" class="mt-10 w-full bg-[#166534] text-white py-5 rounded-3xl text-xl font-bold">Create Banner</button>
      </div>
    </div>

    <!-- ACTIVE BANNERS SECTION -->
    <div id="section-3" class="hidden">
      <h2 class="text-3xl font-bold text-[#166534] mb-6">Active Banners</h2>
      <div id="active-banners" class="grid md:grid-cols-2 gap-8"></div>
    </div>
  </div>

  <!-- Edit Product Modal -->
  <div id="edit-product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-lg mx-4 rounded-3xl overflow-hidden">
      <div class="bg-[#166534] text-white p-6">
        <h3 class="text-2xl font-bold">Edit Product</h3>
      </div>
      <div class="p-8 modal-body">
        <input id="edit-name" class="w-full border p-4 rounded-2xl mb-4" placeholder="Product Name">
        <select id="edit-category" class="w-full border p-4 rounded-2xl mb-4"></select>
        <input id="edit-price" type="number" class="w-full border p-4 rounded-2xl mb-4" placeholder="Price">
        <input id="edit-stock" type="number" class="w-full border p-4 rounded-2xl mb-4" placeholder="Stock">
        <input id="edit-discount" type="number" class="w-full border p-4 rounded-2xl mb-4" placeholder="Discount %">
        <input id="edit-image" class="w-full border p-4 rounded-2xl mb-8" placeholder="Image URL">
      </div>
      <div class="border-t p-6 flex gap-4">
        <button onclick="saveProductEdit()" class="flex-1 bg-[#166534] text-white py-4 rounded-2xl font-bold">Save Changes</button>
        <button onclick="closeProductModal()" class="flex-1 border py-4 rounded-2xl font-bold">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Edit Banner Modal -->
  <div id="edit-banner-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white w-full max-w-2xl mx-4 rounded-3xl overflow-hidden shadow-2xl">
      <div class="bg-[#166534] text-white px-8 py-6">
        <h3 class="text-2xl font-bold">Edit Banner / Offer</h3>
      </div>
      <div class="modal-body p-8 overflow-y-auto" style="max-height: 70vh;">
        <input id="edit-banner-title" class="w-full border p-4 rounded-2xl mb-4" placeholder="Banner Title">
        <input id="edit-banner-discount" type="number" class="w-full border p-4 rounded-2xl mb-4" placeholder="Discount %">
        <textarea id="edit-banner-desc" rows="4" class="w-full border p-4 rounded-2xl mb-6" placeholder="Description"></textarea>
        <input id="edit-banner-image-url" class="w-full border p-4 rounded-2xl mb-3" placeholder="Image URL">
        <input id="edit-banner-image-file" type="file" accept="image/*" class="w-full border p-4 rounded-2xl">
        <div class="mt-10">
          <label class="block font-medium mb-4">Select Products</label>
          <div id="edit-product-checkbox-list" class="max-h-80 overflow-y-auto border rounded-3xl p-6 grid grid-cols-2 gap-4"></div>
        </div>
      </div>
      <div class="border-t p-6 flex gap-4 bg-gray-50">
        <button onclick="saveBannerEdit()" class="flex-1 bg-[#166534] text-white py-4 rounded-2xl font-bold">Save Changes</button>
        <button onclick="closeBannerModal()" class="flex-1 border py-4 rounded-2xl font-bold">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    loadProducts();
    let currentEditProductId = null;
    let currentEditBannerId = null;
    let banners = JSON.parse(localStorage.getItem('banners')) || [];

    function showTab(n) {
      for (let i = 0; i < 4; i++) {
        const section = document.getElementById('section-' + i);
        if (section) section.classList.add('hidden');
      }
      document.getElementById('section-' + n).classList.remove('hidden');
      if (n === 1) renderOrders();
      if (n === 3) renderActiveBanners();
    }

    function populateCategoryDropdown(selectId, selected = "") {
      const select = document.getElementById(selectId);
      select.innerHTML = categories.map(cat => 
        `<option value="${cat}" ${cat === selected ? 'selected' : ''}>${cat}</option>`
      ).join('');
    }

    function showStockAlerts() {
      const div = document.getElementById('stock-alerts');
      const low = products.filter(p => p.stock > 0 && p.stock < 10);
      const out = products.filter(p => p.stock === 0);
      let html = '';
      if (low.length || out.length) {
        html += `<strong>⚠️ Stock Alerts:</strong><br>`;
        if (out.length) html += `Out of Stock: ${out.map(p => p.name).join(', ')}<br>`;
        if (low.length) html += `Low Stock: ${low.map(p => p.name).join(', ')}`;
      } else {
        html = `<strong>✅ All products are well stocked.</strong>`;
      }
      div.innerHTML = html;
    }

    function renderProducts() {
      const table = document.getElementById('product-table');
      let html = `<thead><tr class="bg-[#166534] text-white"><th class="p-4 text-left">Image</th><th class="p-4 text-left">Name</th><th class="p-4 text-left">Category</th><th class="p-4 text-center">Price</th><th class="p-4 text-center">Stock</th><th class="p-4 text-center">Actions</th></tr></thead><tbody>`;
      products.forEach(p => {
        const salePrice = p.discount > 0 ? Math.round(p.price * (1 - p.discount/100)) : p.price;
        html += `
          <tr class="border-b hover:bg-gray-50">
            <td class="p-4"><img src="${p.image}" class="w-14 h-14 object-cover rounded-xl"></td>
            <td class="p-4 font-medium">${p.name}</td>
            <td class="p-4">${p.category}</td>
            <td class="p-4 text-center">Rs. ${salePrice}</td>
            <td class="p-4 text-center ${p.stock === 0 ? 'text-red-600 font-bold' : p.stock < 10 ? 'text-orange-600 font-bold' : ''}">${p.stock}</td>
            <td class="p-4 text-center">
              <button onclick="editProduct(${p.id})" class="bg-yellow-400 px-5 py-2 rounded-2xl text-sm mr-2">Edit</button>
              <button onclick="deleteProduct(${p.id})" class="bg-red-500 text-white px-5 py-2 rounded-2xl text-sm">Delete</button>
            </td>
          </tr>`;
      });
      html += `</tbody>`;
      table.innerHTML = html;
    }

    function downloadSampleCSV() {
      const csv = `name,category,price,stock,discount,image\nMilk 1L,Dairy & Eggs,180,45,0,https://picsum.photos/id/29/400/400\nFresh Bread,Bakery,80,30,15,https://picsum.photos/id/201/400/400`;
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'sample_products.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    function handleCSVUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const lines = e.target.result.split('\n').slice(1);
        let count = 0;
        lines.forEach(line => {
          if (!line.trim()) return;
          const [name, category, price, stock, discount, image] = line.split(',').map(v => v.trim());
          if (!name || !category) return;
          const newId = products.length ? Math.max(...products.map(p => p.id)) + 1 : 1;
          products.push({id: newId, name, category, price: parseFloat(price)||100, stock: parseInt(stock)||0, discount: parseFloat(discount)||0, image: image || "https://picsum.photos/id/29/400/400"});
          count++;
        });
        saveProducts();
        renderProducts();
        showStockAlerts();
        alert(`✅ ${count} products added from CSV!`);
      };
      reader.readAsText(file);
    }

    function addNewProduct() {
      const name = document.getElementById('add-name').value.trim();
      const category = document.getElementById('add-category').value;
      const price = parseFloat(document.getElementById('add-price').value);
      const stock = parseInt(document.getElementById('add-stock').value);
      const discount = parseFloat(document.getElementById('add-discount').value) || 0;
      let image = document.getElementById('add-image-url').value.trim();
      const fileInput = document.getElementById('add-image-file');
      if (!name || !category || isNaN(price) || isNaN(stock)) return alert("Please fill all fields");
      if (fileInput.files && fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          image = e.target.result;
          saveNewProduct(name, category, price, stock, discount, image);
        };
        reader.readAsDataURL(fileInput.files[0]);
      } else {
        if (!image) image = "https://picsum.photos/id/29/400/400";
        saveNewProduct(name, category, price, stock, discount, image);
      }
    }

    function saveNewProduct(name, category, price, stock, discount, image) {
      const newId = products.length ? Math.max(...products.map(p => p.id)) + 1 : 1;
      products.push({id: newId, name, category, price, stock, discount, image});
      saveProducts();
      renderProducts();
      showStockAlerts();
      alert("✅ Product Added Successfully!");
    }

    function editProduct(id) {
      const p = products.find(x => x.id === id);
      if (!p) return;
      currentEditProductId = id;
      populateCategoryDropdown('edit-category', p.category);
      document.getElementById('edit-name').value = p.name;
      document.getElementById('edit-price').value = p.price;
      document.getElementById('edit-stock').value = p.stock;
      document.getElementById('edit-discount').value = p.discount;
      document.getElementById('edit-image').value = p.image;
      document.getElementById('edit-product-modal').classList.remove('hidden');
    }

    function saveProductEdit() {
      const p = products.find(x => x.id === currentEditProductId);
      if (!p) return;
      p.name = document.getElementById('edit-name').value.trim();
      p.category = document.getElementById('edit-category').value;
      p.price = parseFloat(document.getElementById('edit-price').value);
      p.stock = parseInt(document.getElementById('edit-stock').value);
      p.discount = parseFloat(document.getElementById('edit-discount').value) || 0;
      const newImg = document.getElementById('edit-image').value.trim();
      if (newImg) p.image = newImg;
      saveProducts();
      closeProductModal();
      renderProducts();
      showStockAlerts();
      alert("✅ Product Updated Successfully!");
    }

    function closeProductModal() {
      document.getElementById('edit-product-modal').classList.add('hidden');
      currentEditProductId = null;
    }

    function deleteProduct(id) {
      if (!confirm("Delete this product?")) return;
      products = products.filter(p => p.id !== id);
      saveProducts();
      renderProducts();
      showStockAlerts();
      alert("✅ Product Deleted!");
    }

    function renderProductCheckboxes(containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = products.map(p => `
        <label class="flex items-center gap-3 p-4 border rounded-2xl cursor-pointer hover:bg-gray-50">
          <input type="checkbox" value="${p.id}" class="w-5 h-5 accent-[#166534]">
          <img src="${p.image}" class="w-12 h-12 object-cover rounded">
          <div>
            <div class="font-medium">${p.name}</div>
            <div class="text-sm text-gray-500">Rs. ${p.price}</div>
          </div>
        </label>
      `).join('');
    }

    function createBanner() {
      const title = document.getElementById('banner-title').value.trim();
      const discount = parseFloat(document.getElementById('banner-discount').value) || 0;
      const desc = document.getElementById('banner-desc').value.trim();
      let image = document.getElementById('banner-image-url').value.trim();
      const fileInput = document.getElementById('banner-image-file');
      const selectedProducts = Array.from(document.querySelectorAll('#product-checkbox-list input:checked')).map(cb => parseInt(cb.value));

      if (!title) return alert("Please enter banner title");

      if (fileInput.files && fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          image = e.target.result;
          saveBanner(title, discount, desc, image, selectedProducts);
        };
        reader.readAsDataURL(fileInput.files[0]);
      } else {
        if (!image) image = "https://picsum.photos/id/1015/800/400";
        saveBanner(title, discount, desc, image, selectedProducts);
      }
    }

    function saveBanner(title, discount, desc, image, productIds) {
      const newBanner = {
        id: Date.now(),
        title: title,
        discount: discount,
        description: desc || "Special Offer",
        image: image,
        products: productIds,
        created: new Date().toLocaleDateString('en-PK')
      };
      banners.unshift(newBanner);
      localStorage.setItem('banners', JSON.stringify(banners));
      alert("✅ Banner Created Successfully!");
      renderActiveBanners();
    }

    function renderActiveBanners() {
      const container = document.getElementById('active-banners');
      container.innerHTML = banners.map(b => `
        <div class="bg-white rounded-3xl overflow-hidden shadow">
          <img src="${b.image}" class="w-full h-56 object-cover">
          <div class="p-6">
            <h3 class="font-bold text-2xl">${b.title}</h3>
            <p class="text-gray-600 mt-2">${b.description}</p>
            ${b.discount > 0 ? `<p class="text-red-600 font-bold text-xl mt-2">${b.discount}% OFF</p>` : ''}
            <div class="flex gap-3 mt-8">
              <button onclick="editBanner(${b.id})" class="flex-1 bg-yellow-400 py-3 rounded-2xl font-medium">Edit Banner</button>
              <button onclick="deleteBanner(${b.id})" class="flex-1 bg-red-500 text-white py-3 rounded-2xl font-medium">Delete Banner</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function editBanner(id) {
      const banner = banners.find(b => b.id === id);
      if (!banner) return;
      currentEditBannerId = id;
      document.getElementById('edit-banner-title').value = banner.title;
      document.getElementById('edit-banner-discount').value = banner.discount;
      document.getElementById('edit-banner-desc').value = banner.description || '';
      document.getElementById('edit-banner-image-url').value = banner.image || '';
      renderProductCheckboxes('edit-product-checkbox-list');
      const checkboxes = document.querySelectorAll('#edit-product-checkbox-list input');
      checkboxes.forEach(cb => {
        if (banner.products && banner.products.includes(parseInt(cb.value))) cb.checked = true;
      });
      document.getElementById('edit-banner-modal').classList.remove('hidden');
    }

    function saveBannerEdit() {
      const banner = banners.find(b => b.id === currentEditBannerId);
      if (!banner) return;
      banner.title = document.getElementById('edit-banner-title').value.trim();
      banner.discount = parseFloat(document.getElementById('edit-banner-discount').value) || 0;
      banner.description = document.getElementById('edit-banner-desc').value.trim();
      const newImageUrl = document.getElementById('edit-banner-image-url').value.trim();
      if (newImageUrl) banner.image = newImageUrl;
      const fileInput = document.getElementById('edit-banner-image-file');
      if (fileInput.files && fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          banner.image = e.target.result;
          finishBannerEdit();
        };
        reader.readAsDataURL(fileInput.files[0]);
      } else {
        finishBannerEdit();
      }
    }

    function finishBannerEdit() {
      const banner = banners.find(b => b.id === currentEditBannerId);
      const checked = Array.from(document.querySelectorAll('#edit-product-checkbox-list input:checked')).map(cb => parseInt(cb.value));
      banner.products = checked;
      localStorage.setItem('banners', JSON.stringify(banners));
      closeBannerModal();
      renderActiveBanners();
      alert("✅ Banner Updated Successfully!");
    }

    function closeBannerModal() {
      document.getElementById('edit-banner-modal').classList.add('hidden');
      currentEditBannerId = null;
    }

    function deleteBanner(id) {
      if (!confirm("Delete this banner?")) return;
      banners = banners.filter(b => b.id !== id);
      localStorage.setItem('banners', JSON.stringify(banners));
      renderActiveBanners();
      alert("✅ Banner Deleted!");
    }

    // ==================== ORDERS SECTION (FIXED) ====================
    function renderOrders() {
      let orders = JSON.parse(localStorage.getItem('orders')) || [];
      const container = document.getElementById('orders-list');
      if (orders.length === 0) {
        container.innerHTML = `<p class="text-center py-20 text-gray-500">No orders placed yet.</p>`;
        return;
      }
      let html = '';
      orders.forEach((order, index) => {
        html += `
          <div class="bg-white p-6 rounded-3xl shadow">
            <div class="flex justify-between items-start">
              <div>
                <span class="font-bold text-xl">Order #${order.id}</span>
                <span class="ml-4 text-sm text-gray-500">${order.date}</span>
              </div>
              <button onclick="deleteOrder(${index})" class="text-red-600 hover:text-red-700 text-sm">Delete</button>
            </div>
            <p class="mt-2"><strong>Customer:</strong> ${order.customerName}</p>
            <p><strong>Phone:</strong> ${order.customerPhone}</p>
            <p><strong>Total:</strong> Rs. ${order.total}</p>
            <div class="mt-6">
              <select onchange="updateOrderStatus(${index}, this.value)" class="border p-3 rounded-2xl w-full">
                <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                <option value="Placed" ${order.status === 'Placed' ? 'selected' : ''}>Placed</option>
                <option value="Dispatched" ${order.status === 'Dispatched' ? 'selected' : ''}>Dispatched</option>
                <option value="Delivered" ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
              </select>
            </div>
          </div>`;
      });
      container.innerHTML = html;
    }

    function updateOrderStatus(index, newStatus) {
      let orders = JSON.parse(localStorage.getItem('orders')) || [];
      const order = orders[index];
      order.status = newStatus;
      localStorage.setItem('orders', JSON.stringify(orders));

      let message = '';
      if (newStatus === "Placed") {
        message = `Dear ${order.customerName},\n\nYour order #${order.id} has been successfully placed!\nTotal: Rs. ${order.total}\n\nThank you for shopping with IHSAN UL HAQ & SONS!`;
      } else if (newStatus === "Dispatched") {
        message = `Dear ${order.customerName},\n\nYour order #${order.id} has been dispatched and is on the way.\nThank you!`;
      } else if (newStatus === "Delivered") {
        message = `Dear ${order.customerName},\n\nYour order #${order.id} has been delivered successfully.\nWe hope you enjoy your purchase!\nThank you!`;
      } else {
        message = `Dear ${order.customerName},\n\nYour order #${order.id} status is now ${newStatus}.`;
      }

      const waLink = `https://wa.me/92${order.customerPhone.replace(/\D/g, '')}?text=${encodeURIComponent(message)}`;
      window.open(waLink, '_blank');

      alert(`✅ Status updated to "${newStatus}"\n\nWhatsApp opened with message for customer.`);
    }

    function deleteOrder(index) {
      if (!confirm("Delete this order permanently?")) return;
      let orders = JSON.parse(localStorage.getItem('orders')) || [];
      orders.splice(index, 1);
      localStorage.setItem('orders', JSON.stringify(orders));
      renderOrders();
    }

    // Initialize
    populateCategoryDropdown('add-category');
    renderProducts();
    showStockAlerts();
    renderProductCheckboxes('product-checkbox-list');
  </script>
</body>
</html>
