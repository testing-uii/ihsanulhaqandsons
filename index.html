<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IHSAN UL HAQ & SONS General Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/products.js"></script>
</head>
<body class="bg-[#f1f5f1]">

  <!-- Responsive Navbar -->
  <nav class="bg-[#166534] text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <!-- Logo -->
        <div class="flex items-center gap-3">
          <span class="text-4xl">🛒</span>
          <div>
            <h1 class="text-2xl font-bold">IHSAN UL HAQ & SONS</h1>
            <p class="text-xs -mt-1 text-green-100">General Store • Since 1990</p>
          </div>
        </div>

        <!-- Desktop Menu -->
        <div class="hidden md:flex gap-8 text-lg">
          <a href="index.html" class="hover:text-yellow-300">Home</a>
          <a href="shop.html" class="hover:text-yellow-300">Shop</a>
          <a href="offers.html" class="hover:text-yellow-300">Offers</a>
          <a href="about.html" class="hover:text-yellow-300">About</a>
          <a href="contact.html" class="hover:text-yellow-300">Contact</a>
        </div>

        <!-- Cart -->
        <a href="cart.html" class="relative text-3xl">🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-yellow-300 text-[#166534] text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span></a>
      </div>

      <!-- Mobile Menu -->
      <div class="md:hidden flex gap-6 text-lg mt-4 pt-4 border-t border-green-700">
        <a href="index.html" class="hover:text-yellow-300">Home</a>
        <a href="shop.html" class="hover:text-yellow-300">Shop</a>
        <a href="offers.html" class="hover:text-yellow-300">Offers</a>
        <a href="about.html" class="hover:text-yellow-300">About</a>
        <a href="contact.html" class="hover:text-yellow-300">Contact</a>
      </div>
    </div>
  </nav>

  <!-- Home Banners -->
  <div id="home-banners" class="max-w-7xl mx-auto px-4 py-8"></div>

  <!-- Hero -->
  <div class="bg-gradient-to-br from-[#166534] to-green-700 text-white py-20 text-center">
    <div class="max-w-4xl mx-auto px-4">
      <h2 class="text-5xl md:text-6xl font-bold mb-4">IHSAN UL HAQ & SONS</h2>
      <p class="text-3xl mb-6">General Store • Since 1990</p>
      <a href="shop.html" class="inline-block bg-yellow-300 text-[#166534] font-bold text-2xl px-12 py-5 rounded-2xl">Shop Now</a>
    </div>
  </div>

  <!-- Categories -->
  <div class="max-w-7xl mx-auto px-4 py-12">
    <h2 class="text-4xl font-bold text-center mb-10 text-[#166534]">Shop by Category</h2>
    <div id="categories-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
  </div>

  <!-- Featured Products -->
  <div class="max-w-7xl mx-auto px-4 py-12 bg-white">
    <h2 class="text-4xl font-bold text-center mb-10 text-[#166534]">Featured Products</h2>
    <div id="featured-products" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
  </div>

  <footer class="bg-[#166534] text-white py-10 text-center">
    <p>© 1990 - 2026 IHSAN UL HAQ & SONS General Store</p>
  </footer>

  <script>
    loadProducts();
    let banners = JSON.parse(localStorage.getItem('banners')) || [];

    function renderHomeBanners() {
      const container = document.getElementById('home-banners');
      if (banners.length === 0) return;
      container.innerHTML = banners.map(b => `
        <div onclick="showBannerProducts(${b.id})" class="mb-12 rounded-3xl overflow-hidden shadow-2xl cursor-pointer hover:shadow-3xl transition">
          <img src="${b.image}" class="w-full h-auto max-h-[420px] object-cover">
          <div class="bg-white p-8 text-center">
            <h2 class="text-4xl font-bold text-[#166534]">${b.title}</h2>
            <p class="text-xl text-gray-600 mt-3">${b.description}</p>
          </div>
        </div>
      `).join('');
    }

    function showBannerProducts(bannerId) {
      const banner = banners.find(b => b.id === bannerId);
      if (!banner || !banner.products || banner.products.length === 0) {
        alert("No products in this banner.");
        return;
      }
      localStorage.setItem('tempBannerProducts', JSON.stringify(banner.products));
      window.location.href = "shop.html?fromBanner=" + bannerId;
    }

    function renderCategories() {
      const container = document.getElementById('categories-grid');
      container.innerHTML = categories.map(cat => `
        <a href="shop.html?category=${encodeURIComponent(cat)}" class="bg-white rounded-3xl p-8 text-center shadow hover:shadow-xl transition">
          <div class="text-6xl mb-4">📦</div>
          <p class="font-semibold text-[#166534]">${cat}</p>
        </a>
      `).join('');
    }

    function renderFeatured() {
      const container = document.getElementById('featured-products');
      container.innerHTML = products.slice(0, 8).map(p => {
        const oldPrice = p.price;
        const newPrice = p.discount > 0 ? Math.round(p.price * (1 - p.discount/100)) : p.price;
        const isOut = p.stock <= 0;
        return `
          <div class="bg-white border border-gray-200 rounded-3xl overflow-hidden shadow hover:shadow-xl">
            <img src="${p.image}" class="w-full h-52 object-cover">
            <div class="p-5">
              <h3 class="font-bold">${p.name}</h3>
              <p class="text-sm text-gray-500">${p.category}</p>
              <div class="flex items-center gap-4 mt-4">
                <span class="text-3xl font-bold text-[#166534]">Rs. ${newPrice}</span>
                ${p.discount > 0 ? `<span class="text-xl line-through text-red-500">Rs. ${oldPrice}</span>` : ''}
              </div>
              <p class="text-xs text-gray-500 mt-3">Stock: ${p.stock}</p>
              ${isOut ? `<p class="mt-4 text-red-600 font-bold">Out of Stock</p>` : `<button onclick="addToCart(${p.id});" class="mt-6 w-full bg-[#166534] text-white py-3 rounded-2xl">Add to Cart</button>`}
            </div>
          </div>`;
      }).join('');
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      if (!product || product.stock <= 0) return alert("❌ Out of Stock!");
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.push({...product, qty: 1});
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      alert(`${product.name} added to cart!`);
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      document.getElementById('cart-count').textContent = cart.length;
    }

    // Initialize
    renderHomeBanners();
    renderCategories();
    renderFeatured();
    updateCartCount();
  </script>
</body>
</html>
