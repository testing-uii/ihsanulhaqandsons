<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - IHSAN UL HAQ & SONS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/products.js"></script>
</head>
<body class="bg-[#f1f5f1]">
  <!-- Navbar -->
  <nav class="bg-[#166534] text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-4xl">🛒</span>
        <div>
          <h1 class="text-2xl font-bold">IHSAN UL HAQ & SONS</h1>
          <p class="text-xs -mt-1 text-green-100">General Store • Since 1990</p>
        </div>
      </div>
      <div class="hidden md:flex gap-8 text-lg">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="offers.html">Offers</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <a href="cart.html" class="relative text-3xl">🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-yellow-300 text-[#166534] text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span></a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-bold text-[#166534] mb-8">Your Cart</h1>

    <div class="grid md:grid-cols-12 gap-10">
      <!-- Left: Cart Items -->
      <div class="md:col-span-8" id="cart-items"></div>

      <!-- Right: Order Summary (Sticky) -->
      <div class="md:col-span-4">
        <div class="bg-white p-8 rounded-3xl shadow sticky top-8">
          <h2 class="text-2xl font-bold mb-6">Order Summary</h2>
          <div id="summary-items" class="space-y-4 mb-8"></div>
          <div class="border-t pt-6">
            <div class="flex justify-between text-xl font-bold">
              <span>Total</span>
              <span>Rs. <span id="cart-total">0</span></span>
            </div>
          </div>
          <a href="checkout.html" 
             class="mt-10 block text-center bg-[#166534] text-white py-6 text-2xl rounded-3xl font-bold">
            Proceed to Checkout
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    loadProducts();
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function renderCart() {
      const container = document.getElementById('cart-items');
      if (cart.length === 0) {
        container.innerHTML = `<p class="text-center py-20 text-gray-500 text-xl">Your cart is empty</p>`;
        return;
      }
      container.innerHTML = cart.map((item, index) => {
        const salePrice = item.discount > 0 ? Math.round(item.price * (1 - item.discount/100)) : item.price;
        return `
          <div class="flex gap-6 bg-white p-6 rounded-3xl shadow mb-6">
            <img src="${item.image}" class="w-28 h-28 object-cover rounded-2xl">
            <div class="flex-1">
              <h3 class="font-bold">${item.name}</h3>
              <p class="text-sm text-gray-500">${item.category}</p>
              <div class="flex items-center gap-6 mt-6">
                <div class="flex items-center border rounded-2xl">
                  <button onclick="changeQty(${index}, -1)" class="px-5 py-3">-</button>
                  <span class="px-6 font-medium">${item.qty || 1}</span>
                  <button onclick="changeQty(${index}, 1)" class="px-5 py-3">+</button>
                </div>
                <div class="flex-1 text-right">
                  <p class="text-2xl font-bold text-[#166534]">Rs. ${salePrice}</p>
                </div>
                <button onclick="removeFromCart(${index})" class="text-red-500 text-sm">Remove</button>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    function renderSummary() {
      const container = document.getElementById('summary-items');
      let total = 0;
      container.innerHTML = cart.map(item => {
        const salePrice = item.discount > 0 ? Math.round(item.price * (1 - item.discount/100)) : item.price;
        total += salePrice * (item.qty || 1);
        return `
          <div class="flex justify-between">
            <span>${item.name} × ${item.qty || 1}</span>
            <span>Rs. ${salePrice}</span>
          </div>`;
      }).join('');
      document.getElementById('cart-total').textContent = total;
    }

    function changeQty(index, change) {
      const item = cart[index];
      item.qty = (item.qty || 1) + change;
      if (item.qty < 1) item.qty = 1;
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      renderSummary();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      renderSummary();
    }

    // Initialize
    renderCart();
    renderSummary();
  </script>
</body>
</html>
