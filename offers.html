<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offers - IHSAN UL HAQ & SONS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/products.js"></script>
</head>
<body class="bg-[#f1f5f1]">
  <!-- Navbar (fixed) -->
  <nav class="bg-[#166534] text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-4xl">🛒</span>
        <div>
          <h1 class="text-2xl font-bold">IHSAN UL HAQ & SONS</h1>
          <p class="text-xs -mt-1 text-green-100">General Store • Since 1990</p>
        </div>
      </div>
      <div class="hidden md:flex gap-8 text-lg">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="offers.html" class="text-yellow-300 font-bold">Offers</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <a href="cart.html" class="relative text-3xl">🛒 <span id="cart-count" class="absolute -top-1 -right-1 bg-yellow-300 text-[#166534] text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span></a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-12">
    <h1 class="text-5xl font-bold text-center text-[#166534] mb-4">Special Offers</h1>
    <p class="text-center text-xl mb-12">Limited Time Deals – Hurry Up!</p>
    <div id="offers-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </div>

  <script>
    loadProducts();
    function renderOffers() {
      const offers = products.filter(p => p.discount > 0);
      const container = document.getElementById('offers-grid');
      container.innerHTML = offers.map(p => {
        const salePrice = Math.round(p.price * (1 - p.discount/100));
        return `
          <div class="bg-white rounded-3xl overflow-hidden shadow hover:shadow-xl">
            <div class="relative">
              <img src="${p.image}" class="w-full h-64 object-cover">
              <div class="absolute top-4 right-4 bg-red-500 text-white px-4 py-1 text-sm font-bold rounded-full">-${p.discount}% OFF</div>
            </div>
            <div class="p-6">
              <h3 class="font-bold text-xl">${p.name}</h3>
              <p class="line-through text-gray-400">Rs. ${p.price}</p>
              <p class="text-[#166534] text-3xl font-semibold">Rs. ${salePrice}</p>
              <p class="text-xs mt-2">Stock: ${p.stock}</p>
              <button onclick="addToCart(${p.id});" class="mt-6 w-full bg-[#166534] text-white py-4 rounded-2xl">Add to Cart</button>
            </div>
          </div>`;
      }).join('');
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      if (product.stock <= 0) return alert("Out of Stock!");
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.push({...product, qty: 1});
      localStorage.setItem('cart', JSON.stringify(cart));
      alert(`${product.name} added to cart!`);
    }

    renderOffers();
  </script>
</body>
</html>
