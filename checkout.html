<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - IHSAN UL HAQ & SONS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/products.js"></script>
</head>
<body class="bg-[#f1f5f1]">
  <!-- Navbar -->
  <nav class="bg-[#166534] text-white sticky top-0 z-50 shadow-md">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-4xl">🛒</span>
        <div>
          <h1 class="text-2xl font-bold">IHSAN UL HAQ & SONS</h1>
          <p class="text-xs -mt-1 text-green-100">General Store • Since 1990</p>
        </div>
      </div>
      <div class="hidden md:flex gap-8 text-lg">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="offers.html">Offers</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-12">
    <h1 class="text-4xl font-bold text-[#166534] mb-10">Checkout</h1>
    
    <div class="grid md:grid-cols-12 gap-10">
      <!-- Left Side: Delivery + Payment -->
      <div class="md:col-span-7">
        <!-- Delivery Information -->
        <div class="bg-white p-8 rounded-3xl shadow mb-8">
          <h2 class="text-2xl font-bold mb-6">Delivery Information</h2>
          <input id="customer-name" type="text" placeholder="Full Name *" class="w-full border p-4 rounded-2xl mb-4">
          <input id="customer-phone" type="tel" placeholder="Mobile Number (WhatsApp) *" class="w-full border p-4 rounded-2xl mb-4">
          <textarea id="customer-address" placeholder="Full Delivery Address *" class="w-full border p-4 rounded-2xl h-32"></textarea>
          <p class="text-xs text-green-700 mt-3">⚠️ Address is compulsory. Your WhatsApp number must be active for order confirmation.</p>
        </div>

        <!-- Payment -->
        <div class="bg-white p-8 rounded-3xl shadow">
          <h2 class="text-2xl font-bold mb-6">Payment Method</h2>
          <div class="space-y-4">
            <!-- COD -->
            <label class="flex items-center gap-3 p-4 border rounded-2xl cursor-pointer">
              <input type="radio" name="pay" value="COD" checked>
              <div class="flex-1">
                <span class="font-medium">Cash on Delivery (COD)</span>
              </div>
            </label>

            <!-- EasyPaisa -->
            <label class="flex items-center gap-3 p-4 border rounded-2xl cursor-pointer">
              <input type="radio" name="pay" value="EasyPaisa">
              <div class="flex-1">
                <span class="font-medium">EasyPaisa</span>
                <p class="text-sm text-gray-600 mt-1">Transfer to: <strong>03195894880</strong></p>
              </div>
            </label>

            <!-- JazzCash -->
            <label class="flex items-center gap-3 p-4 border rounded-2xl cursor-pointer">
              <input type="radio" name="pay" value="JazzCash">
              <div class="flex-1">
                <span class="font-medium">JazzCash</span>
                <p class="text-sm text-gray-600 mt-1">Transfer to: <strong>03195894880</strong></p>
              </div>
            </label>
          </div>

          <button onclick="placeOrder()" 
                  class="mt-10 w-full bg-[#166534] text-white py-6 text-2xl rounded-3xl">
            Place Order • Rs. <span id="final-total">0</span>
          </button>
        </div>
      </div>

      <!-- Right Side: Order Summary (Sticky like Amazon/Noon) -->
      <div class="md:col-span-5">
        <div class="bg-white p-8 rounded-3xl shadow sticky top-8">
          <h2 class="text-2xl font-bold mb-6">Order Summary</h2>
          <div id="cart-summary" class="space-y-6"></div>
          <div class="border-t pt-6 mt-6">
            <div class="flex justify-between text-xl font-bold">
              <span>Total</span>
              <span>Rs. <span id="summary-total">0</span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    loadProducts();
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function showTotal() {
      let total = 0;
      cart.forEach(item => {
        const salePrice = item.discount > 0 ? Math.round(item.price * (1 - item.discount/100)) : item.price;
        total += salePrice * (item.qty || 1);
      });
      document.getElementById('final-total').textContent = total;
      document.getElementById('summary-total').textContent = total;
    }

    function renderCartSummary() {
      const container = document.getElementById('cart-summary');
      container.innerHTML = cart.map(item => {
        const salePrice = item.discount > 0 ? Math.round(item.price * (1 - item.discount/100)) : item.price;
        return `
          <div class="flex gap-4">
            <img src="${item.image}" class="w-16 h-16 object-cover rounded-2xl">
            <div class="flex-1">
              <p class="font-medium">${item.name}</p>
              <p class="text-sm text-gray-500">Qty: ${item.qty || 1}</p>
              <p class="text-[#166534] font-bold">Rs. ${salePrice}</p>
            </div>
          </div>`;
      }).join('');
    }

    function placeOrder() {
      const name = document.getElementById('customer-name').value.trim();
      const phone = document.getElementById('customer-phone').value.trim();
      const address = document.getElementById('customer-address').value.trim();

      if (!name || !phone || !address) {
        alert("❌ Full Name, Mobile Number and Delivery Address are compulsory!");
        return;
      }

      if (cart.length === 0) return alert("Cart is empty!");

      // Deduct stock
      cart.forEach(cartItem => {
        const product = products.find(p => p.id === cartItem.id);
        if (product) product.stock = Math.max(0, product.stock - (cartItem.qty || 1));
      });
      saveProducts();

      const orderId = "IH" + Math.floor(10000 + Math.random() * 90000);
      const total = parseFloat(document.getElementById('final-total').textContent);

      const order = {
        id: orderId,
        date: new Date().toLocaleString('en-PK'),
        customerName: name,
        customerPhone: phone,
        customerAddress: address,
        items: [...cart],
        total: total,
        status: "Pending"
      };

      let orders = JSON.parse(localStorage.getItem('orders')) || [];
      orders.unshift(order);
      localStorage.setItem('orders', JSON.stringify(orders));

      // Only message - NO auto WhatsApp
      alert(`✅ Your order has been received successfully!\n\nOrder ID: #${orderId}\nTotal: Rs. ${total}\n\nWe will confirm your order shortly through WhatsApp.\nThank you for shopping with IHSAN UL HAQ & SONS`);

      localStorage.removeItem('cart');
      window.location.href = "index.html";
    }

    // Initialize
    showTotal();
    renderCartSummary();
  </script>
</body>
</html>
